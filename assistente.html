                            </div>
                        </div>
                    </a>
                </div>
            </header>

            <div class="container">
                <div class="page-header">
                    <div>
                        <h1>Assistente 3Click</h1>
                        <p>Configure a inteligência do seu atendimento e qualificação de leads.</p>
                    </div>
                </div>

                <div class="card-table" style="padding: 2rem;">
                    <form>
                        <div style="display: flex; flex-direction: column; gap: 2rem;">
                            <div class="form-group">
                                <label>Personalidade do Assistente</label>
                                <textarea class="form-control" rows="4" placeholder="Ex: Um corretor prestativo, formal mas amigável, focado em entender a necessidade do cliente."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Informações sobre o Produto</label>
                                <textarea class="form-control" rows="6" placeholder="Descreva os detalhes dos imóveis ou serviços que o assistente deve conocer."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Diretrizes de Atendimento</label>
                                <textarea class="form-control" rows="4" placeholder="Ex: Nunca dê preços sem antes qualificar o lead. Sempre peça o e-mail após 3 interações."></textarea>
                            </div>
                            <div class="form-group">
                                <label>Regras de Qualificação</label>
                                <textarea class="form-control" rows="6" placeholder="Defina quais perguntas o assistente deve fazer para considerar um lead 'qualificado'."></textarea>
                            </div>
                        </div>
                        <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 1rem;">
                            <button type="reset" class="btn btn-outline">Descartar Alterações</button>
                            <button type="submit" class="btn btn-primary" style="padding: 0.6rem 2rem;">Salvar Configurações</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Click</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/img/fav-icon.png" type="image/png">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body { 
            background: radial-gradient(circle at top right, #FFFFFF 0%, #F3F4F6 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #000000; }
        .header p { color: var(--text-muted); font-size: 0.875rem; }
        .code-input-container { display: flex; justify-content: space-between; align-items: center; gap: 0.5rem; margin-bottom: 2.5rem; }
        .code-input-container input { 
            width: 42px; 
            height: 56px; 
            text-align: center; 
            font-size: 1.5rem; 
            font-weight: 700; 
            border: 2px solid var(--border-color); 
            border-radius: 12px; 
            outline: none; 
            transition: all 0.2s; 
            background-color: #F9FAFB; 
            color: var(--text-main); 
        }
        .code-input-container input:focus { 
            border-color: var(--primary); 
            background: #FFFFFF;
            box-shadow: 0 0 0 4px var(--primary-light); 
        }
        .resend-link { display: block; text-align: center; font-size: 0.875rem; color: var(--text-muted); text-decoration: none; font-weight: 500; }
        .resend-link span { color: var(--primary); cursor: pointer; font-weight: 700; }
        .resend-link span:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <img src="../assets/img/logo-3click.png" alt="3Click Logo" style="height: 60px;">
        </div>
        <div class="header">
            <h1>Verificação de Segurança</h1>
            <p>Insira o código enviado para o seu dispositivo</p>
        </div>
        <form action="../pages/dashboard.html">
            <div class="code-input-container">
                <input type="text" maxlength="1" pattern="[0-9]" required autofocus>
                <input type="text" maxlength="1" pattern="[0-9]" required>
                <input type="text" maxlength="1" pattern="[0-9]" required>
                <input type="text" maxlength="1" pattern="[0-9]" required>
                <input type="text" maxlength="1" pattern="[0-9]" required>
                <input type="text" maxlength="1" pattern="[0-9]" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-weight: 700;">Validar Acesso</button>
            <div class="resend-link">Não recebeu o código? <span>Reenviar agora</span></div>
        </form>
    </div>
    <script>
        const inputs = document.querySelectorAll('.code-input-container input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length > 0 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value.length === 0 && index > 0) {
                    inputs[index - 1].focus();
                }
            });
        });
    </script>
    <!-- Chat Bubble Widget -->
    <script src="../assets/js/chat-bubble.js" defer></script>
</body>
</html>

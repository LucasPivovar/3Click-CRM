<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Click</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/img/fav-icon.png" type="image/png">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body { 
            background: radial-gradient(circle at top right, #FFFFFF 0%, #F3F4F6 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #000000; }
        .header p { color: var(--text-muted); font-size: 0.875rem; }
        .forgot-link { 
            display: block; 
            text-align: right; 
            font-size: 0.875rem; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            margin-bottom: 2rem; 
        }
        .forgot-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <img src="../assets/img/logo-3click.png" alt="3Click Logo" style="height: 60px;">
        </div>
        <div class="header">
            <h1>Acesse sua conta</h1>
            <p>Entre com seus dados para continuar</p>
        </div>
        <form action="2fa.html">
            <div class="form-group">
                <label for="usuario">Usuário</label>
                <input type="text" id="usuario" class="form-control" placeholder="seu.usuario" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <a href="forgot.html" class="forgot-link">Esqueceu sua senha?</a>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-weight: 700;">Entrar no Sistema</button>
        </form>
    </div>
    <!-- Chat Bubble Widget -->
    <script src="../assets/js/chat-bubble.js" defer></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Click</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../styles.css">
    <style>
        body { 
            background: radial-gradient(circle at top right, #FFFFFF 0%, #F3F4F6 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #000000; }
        .header p { color: var(--text-muted); font-size: 0.875rem; }
        .forgot-link { 
            display: block; 
            text-align: right; 
            font-size: 0.875rem; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            margin-bottom: 2rem; 
        }
        .forgot-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>
            3Click
        </div>
        <div class="header">
            <h1>Acesse sua conta</h1>
            <p>Entre com seus dados para continuar</p>
        </div>
        <form action="2fa.html">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="exemplo@vendas.com" required>
            </div>
            <div class="form-group">
                <label for="password">Senha</label>
                <input type="password" id="password" class="form-control" placeholder="••••••••" required>
            </div>
            <a href="forgot.html" class="forgot-link">Esqueceu sua senha?</a>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-weight: 700;">Entrar no Sistema</button>
        </form>
    </div>
    <!-- Chat Bubble Widget -->
    <script src="../chat-bubble.js" defer></script>
</body>
</html>

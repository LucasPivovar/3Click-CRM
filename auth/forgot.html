<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3Click</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="icon" href="../assets/img/fav-icon.png" type="image/png">
    <link rel="stylesheet" href="../assets/css/styles.css">
    <style>
        body { 
            background: radial-gradient(circle at top right, #FFFFFF 0%, #F3F4F6 100%);
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #000000; }
        .header p { color: var(--text-muted); font-size: 0.875rem; }
        .back-link { 
            display: block; 
            text-align: center; 
            font-size: 0.875rem; 
            color: var(--primary); 
            text-decoration: none; 
            font-weight: 600; 
            margin-top: 1.5rem; 
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-logo" style="background: none; box-shadow: none; border: none; padding: 0; margin-bottom: 0.5rem;">
            <img src="../assets/img/logo-3click.png" alt="3Click Logo" style="height: 48px;">
        </div>
        <div class="header">
            <h1>Recuperar Senha</h1>
            <p>Enviaremos as instruções para seu e-mail</p>
        </div>
        <form action="login.html">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" class="form-control" placeholder="exemplo@vendas.com" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.875rem; font-weight: 700;">Enviar Instruções</button>
            <a href="login.html" class="back-link">Voltar para o Login</a>
        </form>
    </div>
    <!-- Chat Bubble Widget -->
    <script src="../assets/js/chat-bubble.js" defer></script>
</body>
</html>
